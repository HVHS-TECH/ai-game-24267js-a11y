<!DOCTYPE html>
<html>
<head>
<title>My AI game</title>
</head>
<body>

    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Flappy Bird Deluxe</title>
    
    <style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }
    
    body{
        overflow:hidden;
        background:#4ec0ca;
        font-family:Arial, sans-serif;
    }
    
    canvas{
        display:block;
        margin:auto;
        background:linear-gradient(#4ec0ca,#dff6ff);
    }
    </style>
    </head>
    <body>
    
    <canvas id="game"></canvas>
    
    <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    
    canvas.width = 480;
    canvas.height = 720;
    
    const W = canvas.width;
    const H = canvas.height;
    
    /* =========================
       GAME SETTINGS
    ========================= */
    
    const gravity = 0.45;
    const flapForce = -8;
    
    const pipeWidth = 80;
    const pipeGap = 170;
    const pipeSpeed = 3;
    
    const groundHeight = 100;
    
    /* =========================
       GAME STATE
    ========================= */
    
    let gameState = "start";
    let score = 0;
    let bestScore = localStorage.getItem("flappyBest") || 0;
    let frame = 0;
    
    /* =========================
       BIRD
    ========================= */
    
    const bird = {
        x: 100,
        y: 300,
        width: 40,
        height: 30,
        velocity: 0,
        rotation: 0
    };
    
    /* =========================
       PIPES
    ========================= */
    
    let pipes = [];
    
    /* =========================
       CLOUDS
    ========================= */
    
    const clouds = [];
    
    for(let i=0;i<5;i++){
        clouds.push({
            x: Math.random()*W,
            y: Math.random()*250,
            size: 50 + Math.random()*40,
            speed: 0.3 + Math.random()*0.5
        });
    }
    
    /* =========================
       RESET
    ========================= */
    
    function resetGame(){
        bird.y = 300;
        bird.velocity = 0;
        bird.rotation = 0;
    
        pipes = [];
        score = 0;
        frame = 0;
    
        gameState = "playing";
    }
    
    /* =========================
       PIPE GENERATION
    ========================= */
    
    function createPipe(){
    
        const top = Math.random()*250 + 80;
    
        pipes.push({
            x: W,
            top,
            bottom: H - top - pipeGap - groundHeight,
            scored:false
        });
    }
    
    /* =========================
       UPDATE
    ========================= */
    
    function update(){
    
        if(gameState !== "playing") return;
    
        frame++;
    
        /* Bird physics */
        bird.velocity += gravity;
        bird.y += bird.velocity;
    
        /* Rotation */
        bird.rotation = Math.min(bird.velocity * 3, 25);
    
        /* Pipe spawn */
        if(frame % 90 === 0){
            createPipe();
        }
    
        /* Pipes */
        for(let i = pipes.length-1; i>=0; i--){
    
            const p = pipes[i];
    
            p.x -= pipeSpeed;
    
            /* Score */
            if(!p.scored && p.x + pipeWidth < bird.x){
                p.scored = true;
                score++;
    
                if(score > bestScore){
                    bestScore = score;
                    localStorage.setItem("flappyBest", bestScore);
                }
            }
    
            /* Remove */
            if(p.x + pipeWidth < 0){
                pipes.splice(i,1);
                continue;
            }
    
            /* Collision */
            if(
                bird.x + bird.width > p.x &&
                bird.x < p.x + pipeWidth &&
                (
                    bird.y < p.top ||
                    bird.y + bird.height > H - p.bottom - groundHeight
                )
            ){
                gameOver();
            }
        }
    
        /* Ground collision */
        if(bird.y + bird.height >= H - groundHeight){
            gameOver();
        }
    
        /* Ceiling */
        if(bird.y < 0){
            bird.y = 0;
            bird.velocity = 0;
        }
    
        /* Clouds */
        clouds.forEach(c=>{
            c.x -= c.speed;
    
            if(c.x + c.size < 0){
                c.x = W + 50;
            }
        });
    }
    
    /* =========================
       GAME OVER
    ========================= */
    
    function gameOver(){
        gameState = "gameover";
    }
    
    /* =========================
       DRAW BACKGROUND
    ========================= */
    
    function drawBackground(){
    
        /* Sky */
        ctx.fillStyle = "#70c5ce";
        ctx.fillRect(0,0,W,H);
    
        /* Clouds */
        ctx.fillStyle = "rgba(255,255,255,0.9)";
    
        clouds.forEach(c=>{
            ctx.beginPath();
            ctx.arc(c.x,c.y,c.size*0.4,0,Math.PI*2);
            ctx.arc(c.x+30,c.y+10,c.size*0.35,0,Math.PI*2);
            ctx.arc(c.x+60,c.y,c.size*0.4,0,Math.PI*2);
            ctx.fill();
        });
    }
    
    /* =========================
       DRAW GROUND
    ========================= */
    
    function drawGround(){
    
        ctx.fillStyle = "#ded895";
        ctx.fillRect(0,H-groundHeight,W,groundHeight);
    
        ctx.fillStyle = "#c0b36d";
    
        for(let i=0;i<W;i+=40){
            ctx.fillRect(i,H-groundHeight,20,8);
        }
    }
    
    /* =========================
       DRAW BIRD
    ========================= */
    
    function drawBird(){
    
        ctx.save();
    
        ctx.translate(
            bird.x + bird.width/2,
            bird.y + bird.height/2
        );
    
        ctx.rotate(bird.rotation * Math.PI/180);
    
        /* Body */
        ctx.fillStyle = "#ffd93d";
    
        ctx.beginPath();
        ctx.ellipse(0,0,20,15,0,0,Math.PI*2);
        ctx.fill();
    
        /* Wing */
        ctx.fillStyle = "#ffcc00";
    
        ctx.beginPath();
        ctx.ellipse(-5,5,10,6,-0.5,0,Math.PI*2);
        ctx.fill();
    
        /* Eye */
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(8,-4,5,0,Math.PI*2);
        ctx.fill();
    
        ctx.fillStyle = "#000";
        ctx.beginPath();
        ctx.arc(10,-4,2,0,Math.PI*2);
        ctx.fill();
    
        /* Beak */
        ctx.fillStyle = "#ff7b00";
    
        ctx.beginPath();
        ctx.moveTo(18,0);
        ctx.lineTo(28,4);
        ctx.lineTo(18,8);
        ctx.fill();
    
        ctx.restore();
    }
    
    /* =========================
       DRAW PIPES
    ========================= */
    
    function drawPipes(){
    
        pipes.forEach(p=>{
    
            /* Pipe body */
            ctx.fillStyle = "#2ecc71";
    
            ctx.fillRect(p.x,0,pipeWidth,p.top);
    
            ctx.fillRect(
                p.x,
                H-p.bottom-groundHeight,
                pipeWidth,
                p.bottom
            );
    
            /* Pipe cap */
            ctx.fillStyle = "#27ae60";
    
            ctx.fillRect(p.x-5,p.top-25,pipeWidth+10,25);
    
            ctx.fillRect(
                p.x-5,
                H-p.bottom-groundHeight,
                pipeWidth+10,
                25
            );
        });
    }
    
    /* =========================
       TEXT
    ========================= */
    
    function drawUI(){
    
        ctx.textAlign = "center";
    
        /* Score */
        if(gameState === "playing"){
    
            ctx.fillStyle = "#fff";
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 4;
    
            ctx.font = "60px Arial";
    
            ctx.strokeText(score,W/2,90);
            ctx.fillText(score,W/2,90);
        }
    
        /* Start screen */
        if(gameState === "start"){
    
            ctx.fillStyle = "#fff";
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 5;
    
            ctx.font = "70px Arial";
    
            ctx.strokeText("Flappy",W/2,220);
            ctx.fillText("Flappy",W/2,220);
    
            ctx.font = "40px Arial";
    
            ctx.strokeText("Press SPACE",W/2,350);
            ctx.fillText("Press SPACE",W/2,350);
    
            ctx.font = "25px Arial";
    
            ctx.strokeText("Avoid the pipes",W/2,420);
            ctx.fillText("Avoid the pipes",W/2,420);
        }
    
        /* Game over */
        if(gameState === "gameover"){
    
            ctx.fillStyle = "rgba(0,0,0,0.45)";
            ctx.fillRect(0,0,W,H);
    
            ctx.fillStyle = "#fff";
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 5;
    
            ctx.font = "60px Arial";
    
            ctx.strokeText("Game Over",W/2,220);
            ctx.fillText("Game Over",W/2,220);
    
            ctx.font = "35px Arial";
    
            ctx.strokeText("Score: " + score,W/2,320);
            ctx.fillText("Score: " + score,W/2,320);
    
            ctx.strokeText("Best: " + bestScore,W/2,380);
            ctx.fillText("Best: " + bestScore,W/2,380);
    
            ctx.font = "28px Arial";
    
            ctx.strokeText("Press SPACE to Restart",W/2,500);
            ctx.fillText("Press SPACE to Restart",W/2,500);
        }
    }
    
    /* =========================
       RENDER
    ========================= */
    
    function render(){
    
        drawBackground();
        drawPipes();
        drawGround();
        drawBird();
        drawUI();
    }
    
    /* =========================
       LOOP
    ========================= */
    
    function loop(){
    
        update();
        render();
    
        requestAnimationFrame(loop);
    }
    
    loop();
    
    /* =========================
       INPUT
    ========================= */
    
    function flap(){
    
        if(gameState === "start"){
            resetGame();
            bird.velocity = flapForce;
            return;
        }
    
        if(gameState === "playing"){
            bird.velocity = flapForce;
            return;
        }
    
        if(gameState === "gameover"){
            resetGame();
            bird.velocity = flapForce;
        }
    }
    
    document.addEventListener("keydown", e=>{
    
        if(e.code === "Space"){
            e.preventDefault();
            flap();
        }
    });
    </script>
    
    </body>
    </html>

<script src="game.js"></script>
</body>
</html>
